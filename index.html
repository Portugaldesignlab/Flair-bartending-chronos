<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flair Bartending — World Educational Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C8860A;
    --gold-light: #FFD700;
    --gold-dark: #8B6008;
    --cream: #F5F0E8;
    --bg: #050505;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--cream);
    font-family: 'Crimson Pro', Georgia, serif;
    overflow-x: hidden;
  }

  /* ── ANIMATIONS ── */
  @keyframes shimmer {
    0%   { background-position: -300% center; }
    100% { background-position:  300% center; }
  }
  @keyframes float0 { 0%,100%{transform:translateY(0)}  50%{transform:translateY(-20px)} }
  @keyframes float1 { 0%,100%{transform:translateY(0)}  50%{transform:translateY(-35px)} }
  @keyframes float2 { 0%,100%{transform:translateY(0)}  50%{transform:translateY(-15px)} }
  @keyframes pulseRing {
    0%   { transform:scale(0.8); opacity:1; }
    100% { transform:scale(2.2); opacity:0; }
  }
  @keyframes fadeIn {
    from { opacity:0; transform:translateY(18px); }
    to   { opacity:1; transform:translateY(0);    }
  }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(40px); }
    to   { opacity:1; transform:translateY(0);    }
  }
  @keyframes slideLeft {
    from { opacity:0; transform:translateX(60px); }
    to   { opacity:1; transform:translateX(0);    }
  }
  @keyframes glow {
    0%,100% { box-shadow:0 0 20px rgba(200,134,10,.3); }
    50%      { box-shadow:0 0 45px rgba(200,134,10,.75); }
  }

  /* ── PARTICLES ── */
  .particles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .particle  { position:absolute; border-radius:50%; }

  /* ── HEADER ── */
  #header {
    position:relative; z-index:10;
    padding: 26px 44px 0;
  }
  #header-inner {
    display:flex; justify-content:space-between; align-items:flex-start;
    flex-wrap: wrap; gap: 16px;
  }
  .main-title {
    font-family:'Cinzel',serif;
    font-size: clamp(22px,4vw,42px);
    font-weight:900; letter-spacing:6px;
    background: linear-gradient(90deg,#8B6008,#C8860A,#FFD700,#C8860A,#8B6008);
    background-size:300% auto;
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    animation:shimmer 4s linear infinite;
    line-height:1;
  }
  .title-row { display:flex; align-items:baseline; gap:14px; }
  .title-badge {
    font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px;
    color:rgba(200,134,10,.5); border-left:1px solid rgba(200,134,10,.3);
    padding-left:14px; text-transform:uppercase;
  }
  .subtitle {
    margin-top:5px; font-size:15px; font-style:italic;
    color:rgba(245,240,232,.48); letter-spacing:1px;
  }
  .header-right { display:flex; flex-direction:column; align-items:flex-end; gap:10px; }

  /* ── LANG BUTTONS ── */
  .lang-group { display:flex; gap:6px; }
  .lang-btn {
    background:transparent; border:1px solid rgba(200,134,10,.35);
    color:rgba(200,134,10,.65); padding:6px 14px; cursor:pointer;
    font-family:'Cinzel',serif; font-size:11px; letter-spacing:1px;
    border-radius:2px; transition:all .2s;
  }
  .lang-btn.active,
  .lang-btn:hover { background:rgba(200,134,10,.14); border-color:var(--gold); color:var(--gold-light); }

  /* ── NAV BUTTONS ── */
  .nav-group { display:flex; }
  .nav-btn {
    background:transparent; border:none; cursor:pointer;
    font-family:'Cinzel',serif; font-size:12px; letter-spacing:2px;
    color:rgba(200,134,10,.55); padding:8px 18px;
    position:relative; transition:all .2s;
  }
  .nav-btn.active { color:var(--gold-light); }
  .nav-btn.active::after {
    content:''; position:absolute; bottom:0; left:18px; right:18px;
    height:1px; background:var(--gold);
  }
  .nav-btn:hover { color:var(--gold-light); }

  /* ── DIVIDER ── */
  .divider {
    display:flex; align-items:center; gap:16px;
    margin:10px 44px 0;
  }
  .divider-line {
    flex:1; height:1px;
    background:linear-gradient(90deg,transparent,rgba(200,134,10,.6),transparent);
  }
  .divider-star { color:rgba(200,134,10,.4); font-size:12px; }

  /* ── ERA LEGEND ── */
  .era-legend {
    display:flex; flex-wrap:wrap; gap:20px;
    padding:0 80px; margin: 32px 0 28px;
  }
  .era-item { display:flex; align-items:center; gap:8px; }
  .era-dot {
    width:10px; height:10px; border-radius:50%;
    flex-shrink:0;
  }
  .era-label {
    font-family:'Cinzel',serif; font-size:10px; letter-spacing:1px;
    color:rgba(245,240,232,.48); text-transform:uppercase;
  }

  /* ── TIMELINE TRACK ── */
  #timeline-view { position:relative; z-index:5; margin-top:36px; }

  .timeline-scroll-wrapper { position:relative; }
  .timeline-axis {
    position:absolute; left:80px; right:80px; top:50%; height:1px;
    background:linear-gradient(90deg,transparent,rgba(200,134,10,.14),rgba(200,134,10,.5),rgba(200,134,10,.14),transparent);
    pointer-events:none; z-index:1;
  }

  .timeline-track {
    display:flex; align-items:center;
    overflow-x:auto; overflow-y:hidden;
    padding: 260px 80px 60px;
    cursor:grab; user-select:none;
    scrollbar-width:thin; scrollbar-color:rgba(200,134,10,.45) rgba(10,10,10,.5);
    -webkit-overflow-scrolling:touch;
  }
  .timeline-track:active { cursor:grabbing; }
  .timeline-track::-webkit-scrollbar { height:4px; }
  .timeline-track::-webkit-scrollbar-track { background:rgba(10,10,10,.5); }
  .timeline-track::-webkit-scrollbar-thumb { background:rgba(200,134,10,.45); border-radius:2px; }

  /* ── COCKTAIL COLUMN ── */
  .cocktail-col {
    display:flex; flex-direction:column; align-items:center;
    flex-shrink:0; margin-right:64px; position:relative;
  }

  /* ── CARD ── */
  .cocktail-card {
    width:240px; border-radius:3px; padding:20px;
    position:relative; overflow:hidden; cursor:pointer;
    border:1px solid rgba(200,134,10,.22);
    transition:transform .3s ease, box-shadow .3s ease;
    animation:fadeIn .6s ease both;
  }
  .cocktail-card:hover {
    transform:translateY(-10px) scale(1.025);
    box-shadow:0 20px 60px rgba(0,0,0,.6);
  }
  .card-above { margin-bottom:0; order:-1; }
  .card-below { margin-top:0;    order:3;  }

  .card-corner {
    position:absolute; top:0; right:0;
    width:40px; height:40px;
    background:linear-gradient(135deg,transparent 50%,rgba(200,134,10,.12) 50%);
  }
  .card-year {
    position:absolute; top:12px; right:12px;
    font-family:'Cinzel',serif; font-size:10px; letter-spacing:1px;
  }
  .card-flag { font-size:28px; margin-bottom:8px; display:block; }
  .card-name {
    font-family:'Cinzel',serif; font-size:15px; font-weight:600;
    letter-spacing:1px; color:var(--cream); line-height:1.2;
    margin-bottom:6px;
  }
  .card-location {
    display:flex; align-items:center; gap:7px; margin-bottom:12px;
  }
  .card-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .card-loc-text {
    font-size:11px; color:rgba(245,240,232,.5); letter-spacing:.5px;
  }
  .card-divider { border:none; border-top:1px solid rgba(200,134,10,.14); margin:4px 0 10px; }
  .card-inv-label {
    font-family:'Cinzel',serif; font-size:9px; letter-spacing:1.5px;
    color:rgba(200,134,10,.55); margin-bottom:3px;
    text-transform:uppercase;
  }
  .card-inv-name { font-size:12px; color:rgba(245,240,232,.7); font-style:italic; }
  .card-cta {
    margin-top:14px; padding:7px 0;
    background:rgba(200,134,10,.07); border:1px solid rgba(200,134,10,.2);
    border-radius:2px; text-align:center;
    font-family:'Cinzel',serif; font-size:9px; letter-spacing:1.5px;
    color:rgba(200,134,10,.8); cursor:pointer;
  }

  /* ── CONNECTOR ── */
  .connector { width:1px; height:44px; order:0; }
  .connector-up   { background:linear-gradient(to bottom,rgba(200,134,10,.6),transparent); order:0; }
  .connector-down { background:linear-gradient(to top,rgba(200,134,10,.6),transparent);   order:0; }

  /* ── NODE ── */
  .timeline-node {
    width:14px; height:14px; border-radius:50%; order:0;
    border:2px solid var(--bg); position:relative; flex-shrink:0;
    z-index:2;
  }
  .timeline-node::after {
    content:''; position:absolute; inset:-5px; border-radius:50%;
    border:1px solid transparent;
    animation:pulseRing 2s ease-out infinite;
  }
  .node-year {
    font-family:'Cinzel',serif; font-size:9px;
    color:rgba(200,134,10,.45); letter-spacing:1px;
    order:0; margin-top:4px;
  }

  /* ── SCROLL HINT ── */
  .scroll-hint {
    text-align:center; font-family:'Cinzel',serif;
    font-size:10px; letter-spacing:2px;
    color:rgba(200,134,10,.28); margin-top:8px;
    animation:float0 2.5s ease-in-out infinite;
  }

  /* ── ASSOCIATIONS ── */
  #assoc-view {
    padding:40px 44px;
    display:none;
  }
  .assoc-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:24px; max-width:1400px; margin:0 auto;
  }
  .assoc-card {
    background:linear-gradient(145deg,#0D0D0D,#060606);
    border:1px solid rgba(200,134,10,.14); border-radius:3px;
    padding:24px; position:relative; overflow:hidden;
    transition:all .3s ease;
    animation:slideUp .5s ease both;
  }
  .assoc-card:hover {
    border-color:rgba(200,134,10,.5); transform:translateY(-5px);
    background:linear-gradient(145deg,#111,#080808);
    box-shadow:0 16px 48px rgba(0,0,0,.5);
  }
  .assoc-top-line {
    position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent,rgba(200,134,10,.55),transparent);
  }
  .assoc-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
  .assoc-flag { font-size:32px; margin-bottom:8px; display:block; }
  .assoc-name {
    font-family:'Cinzel',serif; font-size:14px; font-weight:600;
    letter-spacing:.5px; color:var(--cream); line-height:1.3;
  }
  .assoc-year-badge {
    background:rgba(200,134,10,.1); border:1px solid rgba(200,134,10,.2);
    padding:4px 10px; border-radius:2px;
    font-family:'Cinzel',serif; font-size:10px;
    color:rgba(200,134,10,.8); letter-spacing:1px;
    flex-shrink:0; margin-left:12px; white-space:nowrap;
  }
  .assoc-desc {
    font-size:14px; font-style:italic; line-height:1.65;
    color:rgba(245,240,232,.62); margin-bottom:18px;
  }
  .assoc-footer { display:flex; justify-content:space-between; align-items:center; }
  .assoc-country { font-family:'Cinzel',serif; font-size:9px; letter-spacing:1.5px; color:rgba(200,134,10,.45); text-transform:uppercase; }
  .assoc-members { font-size:12px; color:rgba(200,134,10,.65); }

  /* ── MODAL ── */
  #modal-overlay {
    position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,.92);
    display:none; align-items:center; justify-content:center;
    padding:20px; animation:fadeIn .25s ease;
  }
  #modal-overlay.visible { display:flex; }

  #modal-box {
    width:100%; max-width:820px; max-height:90vh;
    border-radius:4px; overflow:hidden;
    display:flex; flex-direction:column;
    animation:slideLeft .3s ease;
    border:1px solid rgba(200,134,10,.3);
  }

  #modal-header {
    padding:28px 32px 0; flex-shrink:0;
    border-bottom:1px solid rgba(200,134,10,.14);
  }
  .modal-top { display:flex; justify-content:space-between; align-items:flex-start; }
  .modal-flag { font-size:38px; flex-shrink:0; }
  .modal-era-label {
    font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px;
    margin-bottom:5px; opacity:.8;
  }
  .modal-title {
    font-family:'Cinzel',serif; font-size:clamp(20px,4vw,30px);
    font-weight:900; letter-spacing:3px; color:var(--cream); line-height:1;
  }
  .modal-meta { display:flex; flex-wrap:wrap; gap:24px; margin-top:12px; }
  .modal-meta-item { }
  .meta-label {
    font-family:'Cinzel',serif; font-size:9px; letter-spacing:1.5px;
    color:rgba(200,134,10,.5); margin-bottom:2px; text-transform:uppercase;
  }
  .meta-val { font-size:13px; font-style:italic; color:rgba(245,240,232,.78); }

  .close-btn {
    background:rgba(200,134,10,.1); border:1px solid rgba(200,134,10,.3);
    color:var(--gold); width:36px; height:36px; display:flex;
    align-items:center; justify-content:center; cursor:pointer;
    font-size:20px; border-radius:50%; transition:all .2s; flex-shrink:0;
    line-height:1;
  }
  .close-btn:hover { background:rgba(200,134,10,.25); border-color:var(--gold); }

  /* ── TABS ── */
  .modal-tabs { display:flex; margin-top:20px; border-bottom:1px solid rgba(200,134,10,.1); }
  .tab-btn {
    background:transparent; border:none; cursor:pointer;
    font-family:'Cinzel',serif; font-size:10px; letter-spacing:1.5px;
    color:rgba(245,240,232,.45); padding:9px 18px;
    border-bottom:2px solid transparent; transition:all .2s;
    text-transform:uppercase;
  }
  .tab-btn.active { color:var(--gold-light); border-bottom-color:var(--gold); }
  .tab-btn:hover  { color:var(--cream); }

  /* ── MODAL BODY ── */
  #modal-body { overflow:auto; flex:1; padding:28px 32px 36px; }

  .tab-panel { display:none; animation:fadeIn .3s ease; }
  .tab-panel.active { display:block; }

  .section-label {
    font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px;
    color:rgba(200,134,10,.6); margin-bottom:10px; text-transform:uppercase;
  }

  .glass-badge {
    display:inline-block; padding:6px 16px;
    border:1px solid rgba(200,134,10,.25); background:rgba(200,134,10,.05);
    font-size:14px; font-style:italic; color:rgba(245,240,232,.8);
    border-radius:2px;
  }

  .ingredients-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:0 20px;
  }
  .ingredient-item {
    display:flex; align-items:center; gap:8px;
    font-size:14px; color:rgba(245,240,232,.75);
    padding:7px 0; border-bottom:1px solid rgba(200,134,10,.08);
  }
  .ingredient-item::before { content:'◆'; color:var(--gold); font-size:8px; flex-shrink:0; }

  .method-block {
    font-size:15px; line-height:1.82; color:rgba(245,240,232,.8);
    padding:18px; background:rgba(200,134,10,.04);
    border:1px solid rgba(200,134,10,.12); border-radius:2px;
    border-left:3px solid var(--gold);
  }

  .desc-text {
    font-size:16px; line-height:1.82; color:rgba(245,240,232,.8);
  }

  .modern-block {
    padding:24px; border-radius:2px; margin-bottom:10px;
    border:1px solid rgba(200,134,10,.18);
    background:linear-gradient(145deg,rgba(200,134,10,.05),transparent);
  }
  .modern-edition-label {
    font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px;
    color:rgba(200,134,10,.55); margin-bottom:14px;
  }
  .modern-text { font-size:16px; line-height:1.82; color:rgba(245,240,232,.8); }

  .mb-20 { margin-bottom:20px; }
  .mb-24 { margin-bottom:24px; }

  /* ── FOOTER ── */
  #footer {
    position:relative; z-index:5;
    text-align:center; padding:16px;
    border-top:1px solid rgba(200,134,10,.09);
    font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px;
    color:rgba(200,134,10,.22);
  }

  /* responsive */
  @media(max-width:600px) {
    #header-inner { flex-direction:column; }
    .header-right { align-items:flex-start; }
    .era-legend { padding:0 20px; }
    .timeline-track { padding:220px 20px 60px; }
    .timeline-axis { left:20px; right:20px; }
    .cocktail-card { width:200px; }
    .ingredients-grid { grid-template-columns:1fr; }
    #modal-box { max-height:95vh; }
    #modal-header, #modal-body { padding-left:18px; padding-right:18px; }
    #assoc-view { padding:24px 18px; }
  }
</style>
</head>
<body>

<!-- PARTICLES -->
<div class="particles" id="particles"></div>

<!-- HEADER -->
<div id="header">
  <div id="header-inner">
    <div>
      <div class="title-row">
        <h1 class="main-title" data-i18n="title">FLAIR BARTENDING</h1>
        <span class="title-badge">WORLD EDITION</span>
      </div>
      <p class="subtitle" data-i18n="subtitle">A Arte de Misturar o Mundo</p>
    </div>
    <div class="header-right">
      <div class="lang-group">
        <button class="lang-btn active" onclick="setLang('pt')">PT</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('ms')">MY</button>
      </div>
      <div class="nav-group">
        <button class="nav-btn active" id="nav-timeline" onclick="showView('timeline')" data-i18n="timeline">LINHA DO TEMPO</button>
        <button class="nav-btn" id="nav-assoc" onclick="showView('associations')" data-i18n="associations">ASSOCIAÇÕES MUNDIAIS</button>
      </div>
    </div>
  </div>
</div>

<!-- DIVIDER -->
<div class="divider">
  <div class="divider-line"></div>
  <span class="divider-star">✦</span>
  <div class="divider-line"></div>
</div>

<!-- TIMELINE VIEW -->
<div id="timeline-view">
  <div class="era-legend" id="era-legend"></div>
  <div class="timeline-scroll-wrapper">
    <div class="timeline-axis" id="timeline-axis"></div>
    <div class="timeline-track" id="timeline-track"></div>
  </div>
  <div class="scroll-hint" id="scroll-hint">← Arraste para explorar a história →</div>
</div>

<!-- ASSOCIATIONS VIEW -->
<div id="assoc-view">
  <div class="assoc-grid" id="assoc-grid"></div>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="handleOverlayClick(event)">
  <div id="modal-box">
    <div id="modal-header">
      <div class="modal-top">
        <div style="display:flex;gap:14px;align-items:flex-start;flex:1;min-width:0">
          <span class="modal-flag" id="m-flag">🍹</span>
          <div style="min-width:0">
            <div class="modal-era-label" id="m-era-label"></div>
            <div class="modal-title" id="m-name"></div>
          </div>
        </div>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>
      <div class="modal-meta" id="m-meta"></div>
      <div class="modal-tabs" id="modal-tabs"></div>
    </div>
    <div id="modal-body">
      <div class="tab-panel" id="panel-recipe"></div>
      <div class="tab-panel" id="panel-description"></div>
      <div class="tab-panel" id="panel-modern"></div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<div id="footer">✦ FLAIR BARTENDING WORLD EDUCATIONAL PLATFORM ✦</div>

<script>

/* ════════════════════════════════════════
   PARTICLES
═══════════════════════════════════════════ */
(function buildParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = i % 3 === 0 ? 2 : 1;
    const opacity = 0.08 + (i % 5) * 0.055;
    const animClass = ['float0','float1','float2'][i % 3];
    const duration = 3 + (i % 4);
    p.style.cssText = `
      width:${size}px; height:${size}px;
      background:rgba(200,134,10,${opacity});
      left:${(i * 17 + 5) % 100}%;
      top:${(i * 23 + 10) % 100}%;
      box-shadow:0 0 ${4 + i % 8}px rgba(200,134,10,0.28);
      animation:${animClass} ${duration}s ease-in-out infinite;
      animation-delay:${i * 0.15}s;
    `;
    container.appendChild(p);
  }
})();

/* ════════════════════════════════════════
   LANGUAGE
═══════════════════════════════════════════ */
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  rerenderAll();
}

function t(key) { return TRANSLATIONS[lang][key] || key; }
function tEra(era) { return TRANSLATIONS[lang].era_labels[era] || era; }

/* ════════════════════════════════════════
   VIEW SWITCHER
═══════════════════════════════════════════ */
function showView(view) {
  currentView = view;
  document.getElementById('timeline-view').style.display = view === 'timeline' ? 'block' : 'none';
  document.getElementById('assoc-view').style.display   = view === 'associations' ? 'block' : 'none';
  document.getElementById('nav-timeline').classList.toggle('active', view === 'timeline');
  document.getElementById('nav-assoc').classList.toggle('active', view === 'associations');

  if (view === 'associations') renderAssociations();
  if (view === 'timeline') renderTimeline();
  updateStaticText();
}

/* ════════════════════════════════════════
   UPDATE STATIC TEXT
═══════════════════════════════════════════ */
function updateStaticText() {
  document.querySelector('[data-i18n="title"]').textContent     = t('title');
  document.querySelector('[data-i18n="subtitle"]').textContent  = t('subtitle');
  document.querySelector('[data-i18n="timeline"]').textContent  = t('timeline');
  document.querySelector('[data-i18n="associations"]').textContent = t('associations');
  const hint = document.getElementById('scroll-hint');
  if (hint) hint.textContent = t('scroll');
}

/* ════════════════════════════════════════
   ERA LEGEND
═══════════════════════════════════════════ */
function renderLegend() {
  const el = document.getElementById('era-legend');
  el.innerHTML = Object.entries(ERA_COLORS).map(([era, cfg]) => `
    <div class="era-item">
      <div class="era-dot" style="background:${cfg.label}; box-shadow:0 0 8px ${cfg.label}66;"></div>
      <span class="era-label">${tEra(era)}</span>
    </div>
  `).join('');
}

/* ════════════════════════════════════════
   TIMELINE RENDER
═══════════════════════════════════════════ */
function renderTimeline() {
  renderLegend();
  const track = document.getElementById('timeline-track');
  track.innerHTML = '';

  COCKTAILS.forEach((c, idx) => {
    const era = ERA_COLORS[c.era];
    const isAbove = idx % 2 === 0;

    const col = document.createElement('div');
    col.className = 'cocktail-col';

    // Card
    const card = document.createElement('div');
    card.className = `cocktail-card ${isAbove ? 'card-above' : 'card-below'}`;
    card.style.cssText = `
      background:linear-gradient(145deg,${era.bg},#080808);
      border-color:${era.label}44;
      animation-delay:${idx * 0.09}s;
      order:${isAbove ? -1 : 3};
    `;
    card.innerHTML = `
      <div class="card-corner"></div>
      <div class="card-year" style="color:${era.label}">${c.year}</div>
      <span class="card-flag">${c.flag}</span>
      <div class="card-name">${c.name[lang]}</div>
      <div class="card-location">
        <div class="card-dot" style="background:${era.label}; box-shadow:0 0 6px ${era.label}88;"></div>
        <span class="card-loc-text">${c.city[lang]}, ${c.country[lang]}</span>
      </div>
      <hr class="card-divider">
      <div class="card-inv-label">${t('inventor')}</div>
      <div class="card-inv-name">${c.inventor}</div>
      <div class="card-cta">${t('explore')} →</div>
    `;
    card.addEventListener('click', () => openModal(c));

    // Connector
    const conn = document.createElement('div');
    conn.className = `connector ${isAbove ? 'connector-up' : 'connector-down'}`;

    // Node
    const node = document.createElement('div');
    node.className = 'timeline-node';
    node.style.cssText = `
      background:${era.label};
      box-shadow:0 0 14px rgba(${era.glow},.7);
    `;
    node.style.setProperty('--pulse-color', era.label + '55');
    node.innerHTML = `<div style="position:absolute;inset:-5px;border-radius:50%;border:1px solid ${era.label}44;animation:pulseRing 2.2s ease-out infinite;"></div>`;

    // Year label
    const yearLabel = document.createElement('div');
    yearLabel.className = 'node-year';
    yearLabel.textContent = c.year;

    col.appendChild(card);
    col.appendChild(conn);
    col.appendChild(node);
    col.appendChild(yearLabel);
    track.appendChild(col);
  });

  // Drag to scroll
  initDrag(track);
}

/* ════════════════════════════════════════
   DRAG SCROLL
═══════════════════════════════════════════ */
function initDrag(el) {
  let isDown = false, startX = 0, scrollL = 0;
  el.addEventListener('mousedown', e => {
    isDown = true; el.style.cursor = 'grabbing';
    startX = e.pageX - el.offsetLeft; scrollL = el.scrollLeft;
  });
  el.addEventListener('mouseleave', () => { isDown = false; el.style.cursor = 'grab'; });
  el.addEventListener('mouseup',    () => { isDown = false; el.style.cursor = 'grab'; });
  el.addEventListener('mousemove', e => {
    if (!isDown) return; e.preventDefault();
    const x = e.pageX - el.offsetLeft;
    el.scrollLeft = scrollL - (x - startX) * 1.8;
  });
  // Touch
  let touchStartX = 0, touchScrollL = 0;
  el.addEventListener('touchstart', e => { touchStartX = e.touches[0].pageX; touchScrollL = el.scrollLeft; }, { passive:true });
  el.addEventListener('touchmove',  e => {
    const dx = touchStartX - e.touches[0].pageX;
    el.scrollLeft = touchScrollL + dx;
  }, { passive:true });
}

/* ════════════════════════════════════════
   ASSOCIATIONS RENDER
═══════════════════════════════════════════ */
function renderAssociations() {
  const grid = document.getElementById('assoc-grid');
  grid.innerHTML = ASSOCIATIONS.map((a, i) => `
    <div class="assoc-card" style="animation-delay:${i * 0.07}s">
      <div class="assoc-top-line"></div>
      <div class="assoc-header">
        <div>
          <span class="assoc-flag">${a.flag}</span>
          <div class="assoc-name">${a.name}</div>
        </div>
        <div class="assoc-year-badge">Est. ${a.founded}</div>
      </div>
      <div class="assoc-desc">${a.description[lang]}</div>
      <div class="assoc-footer">
        <div class="assoc-country">${a.country[lang]}</div>
        <div class="assoc-members">${a.members}</div>
      </div>
    </div>
  `).join('');
}

/* ════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
function openModal(cocktail) {
  selectedCocktail = cocktail;
  activeTab = 'recipe';
  renderModal();
  document.getElementById('modal-overlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('visible');
  document.body.style.overflow = '';
  selectedCocktail = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function renderModal() {
  const c = selectedCocktail;
  const era = ERA_COLORS[c.era];

  // Modal box background
  document.getElementById('modal-box').style.background =
    `linear-gradient(160deg, ${era.bg} 0%, #080808 100%)`;
  document.getElementById('modal-box').style.borderColor = c.color + '44';

  document.getElementById('m-flag').textContent = c.flag;
  document.getElementById('m-era-label').textContent = `${c.year} · ${tEra(c.era)}`;
  document.getElementById('m-era-label').style.color = era.label;
  document.getElementById('m-name').textContent = c.name[lang];

  // Meta
  const meta = document.getElementById('m-meta');
  meta.innerHTML = [
    [t('country'), c.country[lang]],
    [t('city'),    c.city[lang]],
    [t('inventor'), c.inventor],
    [t('bartender'), c.bartender]
  ].map(([label, val]) => `
    <div class="modal-meta-item">
      <div class="meta-label">${label}</div>
      <div class="meta-val">${val}</div>
    </div>
  `).join('');

  // Tabs
  const tabs = document.getElementById('modal-tabs');
  tabs.innerHTML = [
    ['recipe', t('recipe')],
    ['description', t('description')],
    ['modern', t('modern')]
  ].map(([id, label]) => `
    <button class="tab-btn ${activeTab === id ? 'active' : ''}" onclick="switchTab('${id}')">${label.toUpperCase()}</button>
  `).join('');

  renderPanels();
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderPanels();
}

function renderPanels() {
  const c = selectedCocktail;
  const era = ERA_COLORS[c.era];
  const r = c.recipe[lang];

  // Recipe panel
  document.getElementById('panel-recipe').innerHTML = `
    <div class="mb-20">
      <div class="section-label">${t('glass')}</div>
      <div class="glass-badge">🥃 ${r.glass}</div>
    </div>
    <div class="mb-24">
      <div class="section-label">${t('ingredients')}</div>
      <div class="ingredients-grid">
        ${r.ingredients.map(ing => `<div class="ingredient-item">${ing}</div>`).join('')}
      </div>
    </div>
    <div>
      <div class="section-label">${t('method')}</div>
      <div class="method-block" style="border-left-color:${c.color}">${r.method}</div>
    </div>
  `;

  // Description panel
  document.getElementById('panel-description').innerHTML = `
    <p class="desc-text">${c.description[lang]}</p>
  `;

  // Modern panel
  document.getElementById('panel-modern').innerHTML = `
    <div class="modern-block">
      <div class="modern-edition-label">✦ CONTEMPORARY FLAIR EDITION</div>
      <div class="modern-text">${c.modern[lang]}</div>
    </div>
  `;

  // Show active panel
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${activeTab}`).classList.add('active');
}

/* ════════════════════════════════════════
   RE-RENDER ALL
═══════════════════════════════════════════ */
function rerenderAll() {
  updateStaticText();
  if (currentView === 'timeline') {
    renderTimeline();
  } else {
    renderAssociations();
  }
  if (selectedCocktail) renderModal();
}

/* ════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  updateStaticText();
  renderTimeline();
  document.getElementById('assoc-view').style.display = 'none';
  document.getElementById('timeline-view').style.display = 'block';
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && selectedCocktail) closeModal();
});
</script>
